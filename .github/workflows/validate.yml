name: Validate skill

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke test inventory
        run: python scripts/inventory_repo.py . --out /tmp/code-doc-inventory.json
      - name: Smoke test docs generator
        run: python scripts/code_docs.py generate . --docs-dir /tmp/code-docs
